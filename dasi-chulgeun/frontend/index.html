<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다시,출근 — 데스크탑 실행 에이전트 프로토타입</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- 접근성 툴바 -->
<div class="a11y-bar" role="region" aria-label="화면 설정">
  <span class="lead"><span class="ic">가</span>글자 크기</span>
  <div class="fs-group" role="group" aria-label="글자 크기 선택">
    <button class="fs-btn small" data-fs="15" aria-pressed="false">가</button>
    <button class="fs-btn mid"   data-fs="17" aria-pressed="true">가</button>
    <button class="fs-btn large" data-fs="20" aria-pressed="false">가</button>
  </div>
  <span class="fs-cur" id="fsCur">보통 (17px)</span>
  <span class="spacer"></span>
  <span class="src-legend">데이터 출처:
    <span class="src-pill src-live">live</span>
    <span class="src-pill src-seed">seed</span>
    <span class="src-pill src-fallback">fallback</span>
  </span>
</div>

<div class="wrap">

  <div class="masthead">
    <div class="brand-tag"><span class="dot"></span>데스크탑 웹 프로토타입 · 결정론 로직은 백엔드 실연동</div>
    <h1><span class="em">다시,출근</span> — 데스크탑 실행 에이전트</h1>
    <p>매칭·일정·역량 등급은 백엔드 <b>결정론 로직</b>이 계산합니다. 아바타·음질·합불은 데모용 <b>예시(seed)</b> 표기. (서비스명·데이터는 예시)</p>
  </div>

  <!-- 브라우저 창 프레임 -->
  <div class="win">
    <div class="win-bar">
      <div class="win-nav">
        <button id="backBtn" title="뒤로">←</button>
        <button id="fwdBtn" title="앞으로" disabled>→</button>
      </div>
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="addr"><span class="lock">🔒</span><span id="addr">dasi-chulgeun.kr</span></span>
    </div>
    <!-- 모바일 앱바 (좁은 화면에서만 표시 · 모바일 목업 스타일) -->
    <div class="mtop" id="mtop">
      <button class="mback" id="mback" aria-label="뒤로">←</button>
      <span class="mtitle" id="mtitle">다시,출근</span>
      <span class="mprog" id="mprog"></span>
    </div>
    <div class="mpbar" id="mpbar"><i id="mpbarFill" style="width:8%"></i></div>
    <div class="app" id="app">
      <nav class="side" id="side"></nav>
      <main class="main" id="main"></main>
      <aside class="ctx" id="ctx" style="display:none"></aside>
    </div>
  </div>

</div>
<script src="app.js?v=revert-guide"></script>
</body>
</html>
